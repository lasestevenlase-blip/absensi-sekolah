<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan QR & Selfie - SD BHOANAWA 1</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; text-align: center; }
        .header { background: #e91e63; color: white; padding: 20px; font-weight: bold; }
        .container { padding: 20px; }
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 15px; overflow: hidden; background: white; }
        .btn-kembali { margin-top: 20px; padding: 10px 20px; background: #666; color: white; border: none; border-radius: 10px; cursor: pointer; }
        #hasil-scan { margin-top: 20px; font-weight: bold; color: #b71c1c; }
        #video-container { display: none; margin-top: 20px; }
        video { width: 100%; max-width: 300px; border-radius: 15px; border: 3px solid #e91e63; }
        .btn-foto { background: #e91e63; color: white; padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">ABSENSI: SCAN QR DULU</div>

    <div class="container">
        <div id="qr-section">
            <p>Silakan Scan QR Code yang ada di Sekolah</p>
            <div id="reader"></div>
            <p id="hasil-scan"></p>
        </div>

        <div id="video-container">
            <p>QR Berhasil! Sekarang silakan Foto Selfie</p>
            <video id="webcam" autoplay playsinline></video>
            <br>
            <button class="btn-foto" onclick="ambilFoto()">AMBIL FOTO & KIRIM</button>
        </div>

        <button class="btn-kembali" onclick="location.href='dashboard.html'">Kembali ke Menu</button>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const qrConfig = { fps: 10, qrbox: { width: 250, height: 250 } };

        // 1. MULAI KAMERA SCAN QR
        html5QrCode.start({ facingMode: "environment" }, qrConfig, (decodedText) => {
            document.getElementById("hasil-scan").innerText = "Lokasi Ditemukan: " + decodedText;
            html5QrCode.stop(); 
            document.getElementById("qr-section").style.display = "none"; 
            mulaiSelfie(); 
        }).catch(err => {
            alert("Gagal buka kamera: " + err);
        });

        // 2. FUNGSI KAMERA SELFIE
        async function mulaiSelfie() {
            const videoContainer = document.getElementById("video-container");
            const video = document.getElementById("webcam");
            videoContainer.style.display = "block";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
            } catch (err) {
                alert("Gagal buka kamera depan: " + err);
            }
        }

        // 3. AMBIL FOTO & CEK LOGIKA (TELAT/PIKET)
        function ambilFoto() {
            const sekarang = new Date();
            const jam = sekarang.getHours();
            const menit = sekarang.getMinutes();
            const waktuTeks = jam.toString().padStart(2, '0') + ":" + menit.toString().padStart(2, '0');
            
            // CEK TERLAMBAT (Batas 07:00)
            let statusMasuk = "";
            if (jam < 7 || (jam === 7 && menit === 0)) {
                statusMasuk = "✅ TEPAT WAKTU (Mantap Bosku!)";
            } else {
                statusMasuk = "⚠️ TERLAMBAT (Semangat, besok jangan telat ya!)";
            }

            // CEK PIKET
            const statusPiket = localStorage.getItem("statusPiket") || "";
            let pesanPiket = "";
            if (statusPiket.toLowerCase().includes("piket")) {
                pesanPiket = "\n\n📢 JANGAN LUPA: Hari ini Bosku jadwal PIKET!";
            }

            alert("Sedang Mengirim Absensi... (Sabar ya Bosku)");

            setTimeout(() => {
                alert("ABSENSI BERHASIL TERKIRIM!\n" +
                      "----------------------------\n" +
                      "Jam Absen: " + waktuTeks + "\n" +
                      "Status: " + statusMasuk + 
                      pesanPiket);
                
                location.href = 'dashboard.html';
            }, 2000);
        }
    </script>
</body>
</html>
