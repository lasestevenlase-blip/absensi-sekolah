<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi SD BHOANAWA 1</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; text-align: center; }
        .header { background: #e91e63; color: white; padding: 20px; font-weight: bold; font-size: 18px; }
        .container { padding: 20px; }
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 15px; overflow: hidden; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #video-container { display: none; margin-top: 20px; }
        video { width: 100%; max-width: 300px; border-radius: 15px; border: 4px solid #4caf50; background: #000; }
        .btn-foto { background: #4caf50; color: white; padding: 15px 35px; border: none; border-radius: 50px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; }
        .info-box { background: white; padding: 15px; border-radius: 10px; margin: 10px auto; max-width: 400px; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #e91e63; }
    </style>
</head>
<body>

    <div id="qr-section">
        <div class="header">TAHAP 1: SCAN QR SEKOLAH</div>
        <div class="container">
            <p>Silakan Scan QR Code yang ada di Sekolah</p>
            <div id="reader"></div>
        </div>
    </div>

    <div id="video-container">
        <div class="header" style="background: #4caf50;">TAHAP 2: FOTO SELFIE</div>
        <div class="container">
            <div class="info-box" id="info-guru"></div>
            <video id="webcam" autoplay playsinline></video>
            <br>
            <button class="btn-foto" onclick="ambilFoto()">AMBIL FOTO & KIRIM</button>
        </div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        let koordinatGPS = "Mencari...";

        navigator.geolocation.getCurrentPosition((pos) => {
            koordinatGPS = pos.coords.latitude + ", " + pos.coords.longitude;
        }, (err) => { koordinatGPS = "GPS Tidak Aktif"; });

        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
            html5QrCode.stop().then(() => {
                document.getElementById("qr-section").style.display = "none";
                tampilkanSelfie();
            });
        });

        function tampilkanSelfie() {
            document.getElementById("video-container").style.display = "block";
            const video = document.getElementById("webcam");
            const nama = localStorage.getItem("namaUser") || "Guru";
            const skrg = new Date();
            const jamTeks = skrg.getHours().toString().padStart(2, '0') + ":" + skrg.getMinutes().toString().padStart(2, '0');
            let status = (skrg.getHours() < 7 || (skrg.getHours() === 7 && skrg.getMinutes() === 0)) ? "TEPAT WAKTU" : "TERLAMBAT";

            document.getElementById("info-guru").innerHTML = `
                <b>Nama:</b> ${nama}<br>
                <b>Jam Scan:</b> ${jamTeks}<br>
                <b>Status:</b> ${status}
            `;
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => video.srcObject = s);
        }

        async function ambilFoto() {
            const infoText = document.getElementById("info-guru").innerText;
            const jamTeks = infoText.split('\n')[1].split(': ')[1];
            const statusTeks = infoText.split('\n')[2].split(': ')[1];

            alert("Sedang Mengirim... Sabar ya Bosku");

            // --- TEMPEL URL EXEC DARI DEPLOYMENT BARU DI SINI ---
            const url = "https://script.google.com/macros/s/AKfycbwPSS-__v3hVLKS0W7tGK7IfRaS2zPkTXP9aQov2peSdbsmBo_SjXmU8B6zJctcD2Rrxw/exec";

            try {
                await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors', // Penting untuk menghindari error CORS saat ngetes
                    body: JSON.stringify({
                        "username": localStorage.getItem("namaUser"),
                        "waktu": jamTeks,
                        "status": statusTeks,
                        "latlong": koordinatGPS
                    })
                });
                
                alert("BERHASIL! Data sudah dikirim. Cek Sheet ABSEN SENIN-RABU Bosku.");
                window.location.href = 'dashboard.html';
            } catch (e) { 
                alert("Gagal kirim! Cek Link Apps Script."); 
            }
        }
    </script>
</body>
</html>
