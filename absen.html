<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan QR & Selfie - SD BHOANAWA 1</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; text-align: center; }
        .header { background: #e91e63; color: white; padding: 20px; font-weight: bold; font-size: 18px; }
        .container { padding: 20px; }
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 15px; overflow: hidden; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-kembali { margin-top: 20px; padding: 12px 25px; background: #666; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #hasil-scan { margin-top: 20px; font-weight: bold; color: #b71c1c; }
        #video-container { display: none; margin-top: 20px; }
        video { width: 100%; max-width: 300px; border-radius: 15px; border: 4px solid #e91e63; background: #000; }
        .btn-foto { background: #e91e63; color: white; padding: 15px 35px; border: none; border-radius: 50px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3); }
        .btn-foto:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">TAHAP 1: SCAN QR SEKOLAH</div>

    <div class="container">
        <div id="qr-section">
            <p>Arahkan kamera ke QR Code di Sekolah</p>
            <div id="reader"></div>
            <p id="hasil-scan"></p>
        </div>

        <div id="video-container">
            <div class="header" style="background: #4caf50; border-radius: 10px; margin-bottom: 10px;">TAHAP 2: FOTO SELFIE</div>
            <p>QR Berhasil! Sekarang silakan Foto Wajah Bosku</p>
            <video id="webcam" autoplay playsinline></video>
            <br>
            <button class="btn-foto" onclick="ambilFoto()">AMBIL FOTO & KIRIM</button>
        </div>

        <button class="btn-kembali" onclick="location.href='dashboard.html'">Kembali ke Menu</button>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const qrConfig = { fps: 10, qrbox: { width: 250, height: 250 } };

        // 1. MULAI KAMERA SCAN QR
        html5QrCode.start({ facingMode: "environment" }, qrConfig, (decodedText) => {
            document.getElementById("hasil-scan").innerText = "Lokasi Terdeteksi!";
            html5QrCode.stop(); 
            document.getElementById("qr-section").style.display = "none"; 
            mulaiSelfie(); 
        }).catch(err => {
            alert("Gagal buka kamera: " + err);
        });

        // 2. FUNGSI KAMERA SELFIE
        async function mulaiSelfie() {
            const videoContainer = document.getElementById("video-container");
            const video = document.getElementById("webcam");
            videoContainer.style.display = "block";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
            } catch (err) {
                alert("Gagal buka kamera depan: " + err);
            }
        }

        // 3. FUNGSI AMBIL FOTO & KIRIM DATA
        async function ambilFoto() {
            const video = document.getElementById("webcam");
            const canvas = document.createElement("canvas");
            
            // Set ukuran foto sesuai video
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext("2d").drawImage(video, 0, 0);
            
            // Ambil data gambar (Base64)
            const base64Image = canvas.toDataURL("image/jpeg").split(",")[1];

            // LOGIKA WAKTU
            const sekarang = new Date();
            const jam = sekarang.getHours();
            const menit = sekarang.getMinutes();
            const waktuTeks = jam.toString().padStart(2, '0') + ":" + menit.toString().padStart(2, '0');
            
            // Cek Status (Tepat Waktu batas 07:00)
            let statusMasuk = (jam < 7 || (jam === 7 && menit === 0)) ? "✅ TEPAT WAKTU" : "⚠️ TERLAMBAT";
            
            // Cek Status Piket
            const statusPiket = localStorage.getItem("statusPiket") || "";
            let teksPiket = (statusPiket.toLowerCase() === "piket") ? "\n📢 JANGAN LUPA: Hari ini Bosku jadwal PIKET!" : "";

            alert("Sedang Mengirim Absensi... Sabar ya Bosku");

            // --- KONEKSI KE GOOGLE SHEETS ---
            // Ganti URL di bawah ini dengan URL Deployment Bosku nanti
            const urlDatabase = "https://script.google.com/macros/s/AKfycbwl9RpJBKJdJeY-TZ7BEOzDCG7Xc9YNzGI6tVD4LHM7jewuXq5HQ3q88j0XmLyiAel69w/exec"; 

            try {
                // Proses kirim ke Sheets (Data Nama, Foto, Waktu, Status)
                const response = await fetch(urlDatabase, {
                    method: 'POST',
                    body: JSON.stringify({
                        "username": localStorage.getItem("namaUser"),
                        "image": base64Image,
                        "waktu": waktuTeks,
                        "status": statusMasuk,
                        "piket": statusPiket
                    })
                });
                
                const res = await response.json();

                if (res.result === "success") {
                    alert("ABSENSI BERHASIL TERKIRIM!\n" +
                          "----------------------------\n" +
                          "Jam Absen: " + waktuTeks + "\n" +
                          "Status: " + statusMasuk + 
                          teksPiket);
                    
                    window.location.href = 'dashboard.html';
                } else {
                    alert("Gagal Terkirim: Nama tidak dikenali.");
                }

            } catch (error) {
                // Jika koneksi belum dipasang (URL masih kosong), tampilkan simulasi sukses agar Bosku bisa tes
                console.log("Error koneksi karena URL belum dipasang");
                alert("SIMULASI SUKSES (Kabel belum disambung)\n" +
                      "----------------------------\n" +
                      "Jam Absen: " + waktuTeks + "\n" +
                      "Status: " + statusMasuk + 
                      teksPiket);
                window.location.href = 'dashboard.html';
            }
        }
    </script>
</body>
</html>
