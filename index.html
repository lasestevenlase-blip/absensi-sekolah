<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem SD BHOANAWA 1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Reset Dasar agar Full Layar */
        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #e91e63 0%, #b71c1c 100%);
            padding: 50px 20px 60px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 60px;
            border-bottom-right-radius: 60px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .logo {
            width: 90px;
            height: 90px;
            background: white;
            padding: 10px;
            border-radius: 50%;
            margin-bottom: 15px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            object-fit: contain;
        }

        h2 { margin: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        p.school-name { margin: 5px 0 0; font-size: 14px; opacity: 0.9; }

        .form-section {
            flex: 1;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
        }

        .instruction {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #e91e63;
            font-size: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 15px 16px 55px;
            border: 2px solid #eee;
            border-radius: 15px;
            font-size: 16px;
            outline: none;
            background: #fdfdfd;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #e91e63;
            background: white;
            box-shadow: 0 0 10px rgba(233, 30, 99, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.3);
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-login:active {
            transform: scale(0.97);
            background: #d81b60;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #bbb;
            font-size: 11px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <img src="logo.jpg" class="logo" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/9/9c/Logo_Tut_Wuri_Handayani.png'">
            <h2>SD INPRES BHOANAWA 1</h2>
            <p class="school-name">KABUPATEN ENDE</p>
        </div>

        <div class="form-section">
            <p class="instruction">Silakan masuk ke akun Anda</p>
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Username / NIP">
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password">
            </div>

            <button class="btn-login" onclick="checkLogin()">LOGIN</button>
            
            <div style="flex: 1;"></div> 
            <div class="footer">
                PRESENSI DIGITAL &copy; 2026<br>
                SD INPRES BHOANAWA 1
            </div>
        </div>
    </div>

    <script>
        async function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.querySelector('.btn-login');

            if (user === "" || pass === "") {
                alert("Bosku, Nama dan Password tidak boleh kosong!");
                return;
            }

            btn.innerText = "MENCOCOKKAN DATA...";
            btn.disabled = true;

            const urlDatabase = "https://script.google.com/macros/s/AKfycbyjQizsansKzbRWvHo1VzF0PZw-nDKqLU8clL0HrwVHV-GCi14oLIymwWQieaIL1S_i2g/exec";

            try {
                const response = await fetch(urlDatabase, {
                    method: 'POST',
                    body: JSON.stringify({ "username": user, "password": pass })
                });
                
                const data = await response.json();

                if (data.result === "success") {
                    alert("Berhasil! Selamat datang " + data.nama);
                    localStorage.setItem("namaUser", data.nama);
                    localStorage.setItem("statusPiket", data.piket);
                    // OTOMATIS PINDAH KE HALAMAN MENU
                    window.location.href = "dashboard.html"; 
                } else {
                    alert("Wah, Username atau Password Salah! Cek lagi di Google Sheets ya.");
                }
            } catch (error) {
                alert("Koneksi gagal! Cek internet atau pastikan URL Script sudah benar.");
            } finally {
                btn.innerText = "LOGIN";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
