<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; background: #f4f4f4; }
        .header { background: #4caf50; color: white; padding: 15px; font-weight: bold; }
        #reader { width: 100%; max-width: 400px; margin: auto; }
        #webcam { width: 90%; border-radius: 10px; border: 3px solid #4caf50; display: none; margin: 10px auto; }
        .info { background: white; margin: 10px; padding: 15px; border-radius: 8px; text-align: left; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background: #4caf50; color: white; padding: 15px; border: none; border-radius: 8px; width: 80%; font-weight: bold; display: none; margin: 10px auto; cursor: pointer; }
    </style>
</head>
<body>
    <div id="s1"><div class="header" style="background:#d81b60">LANGKAH 1: SCAN QR</div><div id="reader"></div></div>
    <div id="s2">
        <div class="header">LANGKAH 2: SELFIE</div>
        <div class="info" id="box"></div>
        <video id="webcam" autoplay playsinline></video>
        <button id="btn" onclick="kirim()">KIRIM ABSEN</button>
    </div>
    <script>
        const scanner = new Html5Qrcode("reader");
        let gps = "", jamFix = "", statusFix = "";
        
        navigator.geolocation.getCurrentPosition(p => gps = p.coords.latitude + "," + p.coords.longitude);
        
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, () => {
            scanner.stop(); 
            document.getElementById("s1").style.display = "none"; 
            tampil();
        });

        function tampil() {
            const nm = localStorage.getItem("namaUser");
            const pk = localStorage.getItem("piketUser") || "-";
            const d = new Date();
            // Format Jam agar muncul di HP
            jamFix = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
            statusFix = (d.getHours() < 7 || (d.getHours() == 7 && d.getMinutes() <= 15)) ? "TEPAT WAKTU" : "TERLAMBAT";
            
            document.getElementById("box").style.display = "block";
            document.getElementById("webcam").style.display = "block";
            document.getElementById("btn").style.display = "block";
            
            // Menampilkan Jam dan Piket di layar HP
            document.getElementById("box").innerHTML = `
                <b>Nama:</b> ${nm}<br>
                <b>Jam Scan:</b> ${jamFix}<br>
                <b>Status:</b> ${statusFix}<br>
                <b>Piket:</b> ${pk}
            `;
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                     .then(s => document.getElementById("webcam").srcObject = s);
        }

        async function kirim() {
            // PAKAI URL APPS SCRIPT BOSKU YANG PALING BARU
            const url = "https://script.google.com/macros/s/AKfycbyjQizsansKzbRWvHo1VzF0PZw-nDKqLU8clL0HrwVHV-GCi14oLIymwWQieaIL1S_i2g/exec";
            
            document.getElementById("btn").innerText = "MENGIRIM...";
            document.getElementById("btn").disabled = true;

            try {
                await fetch(url, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ 
                        "username": localStorage.getItem("namaUser"), 
                        "waktu": jamFix, 
                        "status": statusFix, 
                        "latlong": gps 
                    })
                });
                alert("Berhasil Bosku! Cek Absensi_Harian sekarang."); 
                window.location.href = "dashboard.html";
            } catch (e) {
                alert("Gagal Kirim! Cek Sinyal.");
                document.getElementById("btn").innerText = "KIRIM ABSEN";
                document.getElementById("btn").disabled = false;
            }
        }
    </script>
</body>
</html>
