<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Presensi - SD BHOANAWA 1</title>
    <style>
        body { font-family: sans-serif; background: linear-gradient(135deg, #d81b60, #b71c1c); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #d81b60; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #msg { color: red; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="logo.jpg" style="width: 80px; margin-bottom: 10px;">
        <h3>LOGIN GURU</h3>
        <input type="text" id="user" placeholder="Nama Lengkap / NIP">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">MASUK</button>
        <div id="msg"></div>
    </div>
    <script>
        async function login() {
            const user = document.getElementById("user").value;
            const pass = document.getElementById("pass").value;
            // LINK APPS SCRIPT BOSKU
            const url = "https://script.google.com/macros/s/AKfycbwNz0dCm2oD8I38mC0_OUekXEkJKxJaiL9iczyVQ_WLVql8katEIh6-LFOfjHi7wKELcQ/exec";
            
            try {
                const res = await fetch(url, { method: 'POST', body: JSON.stringify({ "username": user, "password": pass }) });
                const data = await res.json();
                if (data.result === "success") {
                    localStorage.setItem("namaUser", data.nama);
                    localStorage.setItem("piketUser", data.piket);
                    window.location.href = "dashboard.html";
                } else { document.getElementById("msg").innerText = "Salah Bosku, Cek Lagi!"; }
            } catch (e) { document.getElementById("msg").innerText = "Koneksi Error!"; }
        }
    </script>
</body>
</html>
