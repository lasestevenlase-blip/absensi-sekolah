<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Kamera & GPS</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        #reader, #webcam { width: 100%; max-width: 400px; margin: auto; border-radius: 10px; }
        .info { background: white; padding: 15px; margin: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: #4caf50; color: white; padding: 15px; border: none; border-radius: 5px; width: 80%; font-weight: bold; }
    </style>
</head>
<body>
    <div id="step-scan">
        <h3>TAHAP 1: SCAN QR</h3>
        <div id="reader"></div>
    </div>

    <div id="step-selfie" style="display:none;">
        <h3>TAHAP 2: FOTO SELFIE</h3>
        <div class="info" id="detail-guru"></div>
        <video id="webcam" autoplay playsinline></video>
        <button class="btn" onclick="kirimData()">AMBIL FOTO & KIRIM</button>
    </div>

    <script>
        let gpsData = "Mencari GPS...";
        navigator.geolocation.getCurrentPosition(p => { 
            gpsData = p.coords.latitude + "," + p.coords.longitude; 
        });

        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, () => {
            scanner.stop();
            document.getElementById('step-scan').style.display = 'none';
            mulaiKamera();
        });

        function mulaiKamera() {
            document.getElementById('step-selfie').style.display = 'block';
            const video = document.getElementById('webcam');
            const nama = localStorage.getItem("namaUser");
            const skrg = new Date();
            const jamTeks = skrg.getHours().toString().padStart(2,'0') + ":" + skrg.getMinutes().toString().padStart(2,'0');
            const status = (skrg.getHours() < 7 || (skrg.getHours() === 7 && skrg.getMinutes() === 0)) ? "TEPAT WAKTU" : "TERLAMBAT";
            
            document.getElementById('detail-guru').innerHTML = `Nama: ${nama}<br>Jam: ${jamTeks}<br>Status: ${status}`;
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => video.srcObject = s);
        }

        async function kirimData() {
            const video = document.getElementById('webcam');
            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext("2d").drawImage(video, 0, 0);
            
            alert("Sabar Bosku, Sedang Mengirim...");
            
            const url = "URL_WEB_APP_BOSKU"; // GANTI DENGAN URL APPS SCRIPT
            await fetch(url, {
                method: 'POST',
                body: JSON.stringify({
                    "username": localStorage.getItem("namaUser"),
                    "waktu": document.getElementById('detail-guru').innerText.split('\n')[1].split(': ')[1],
                    "status": document.getElementById('detail-guru').innerText.split('\n')[2].split(': ')[1],
                    "latlong": gpsData
                })
            });
            alert("Berhasil! Angka 1 sudah masuk di Kolom H.");
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
